<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Dokter Santai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header>
            <h1>🤖 Dokter Santai</h1>
            <p>AI Chatbot Kesehatan dengan gaya santai</p>
        </header>
        <div id="chat-box" class="chat-box"></div>
        <form id="chat-form" autocomplete="off">
            <input type="text" id="user-input" placeholder="Tulis pesan..." autocomplete="off" required />
            <button type="submit">Kirim</button>
        </form>
    </div>
    <footer>
        <small>© 2026 Dokter Santai. <i>AI untuk edukasi, bukan pengganti dokter asli.</i></small>
    </footer>
    <script src="script.js"></script>
</body>
</html>
